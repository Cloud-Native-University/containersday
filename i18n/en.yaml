cd_tourism_intro:
  other: "Take advantage of your trip to Containers Day in Santiago de los Caballeros to immerse yourself in history, culture, and joy."
cd_tourism_activity_1_tag:
  other: "Culture"
cd_tourism_activity_1_title:
  other: "Monument to the Restoration"
cd_tourism_activity_1_desc:
  other: "The undisputed icon of Santiago. A majestic 70-meter tower offering the best panoramic views of the city and the Cibao Valley."
cd_tourism_activity_1_cta:
  other: "Explore Museum →"
cd_tourism_activity_2_tag:
  other: "Art"
cd_tourism_activity_2_title:
  other: "León Cultural Center"
cd_tourism_activity_2_desc:
  other: "One of the most modern and award-winning museums in the Caribbean. A deep dive into Dominican identity, art, and ecology."
cd_tourism_activity_2_cta:
  other: "View Exhibitions →"
cd_tourism_activity_3_tag:
  other: "Tradition"
cd_tourism_activity_3_title:
  other: "La Aurora Cigar World"
cd_tourism_activity_3_desc:
  other: "Visit the country's oldest cigar factory. Learn about the artisanal process of premium tobacco that has put Santiago on the world map."
cd_tourism_activity_3_cta:
  other: "Schedule Tour →"
cd_tourism_activity_4_tag:
  other: "Urban"
cd_tourism_activity_4_title:
  other: "Los Pepines Murals"
cd_tourism_activity_4_desc:
  other: "A burst of creativity in the streets. Vibrant urban art celebrating carnival, music, and Santiago traditions."
cd_tourism_activity_4_cta:
  other: "Photo Walk →"
cd_tourism_activity_5_tag:
  other: "Gastronomy"
cd_tourism_activity_5_title:
  other: "Taste of Cibao"
cd_tourism_activity_5_desc:
  other: "From legendary Mofongo to high-end fusion cuisine. Santiago is the gastronomic epicenter for the most demanding palates."
cd_tourism_activity_5_cta:
  other: "Food Guide →"
cd_tourism_activity_6_tag:
  other: "History"
cd_tourism_activity_6_title:
  other: "Santiago Apostle Cathedral"
cd_tourism_activity_6_desc:
  other: "Pillar of the historic center. An architectural gem from the late 19th century that holds the city's spiritual essence."
cd_tourism_activity_6_cta:
  other: "Historic Visit →"
cd_venue_name:
  other: "Universidad UAPA (UAPA)"
cd_venue_desc:
  other: "Official venue of Containers Day 2026. A modern campus designed for education and technological innovation."
cd_venue_address:
  other: "Av. Hispanoamericana #100, Thomén, Postal code 51000, Santiago de los Caballeros, Dominican Republic"
cd_venue_about_title:
  other: "About the Venue"
cd_venue_about_desc:
  other: "The Open University for Adults (UAPA) is a pioneer in distance higher education in the Dominican Republic. Its Santiago campus features auditoriums, smart classrooms, and modern spaces ideal for a tech conference."
cd_venue_accessibility_title:
  other: "Accessibility"
cd_venue_accessibility_desc:
  other: "The UAPA campus has accessible facilities including ramps, elevators, and adapted restrooms for people with reduced mobility."
cd_venue_amenities_title:
  other: "Amenities"
cd_venue_amenity_wifi:
  other: "High-speed WiFi throughout the campus"
cd_venue_amenity_ac:
  other: "Air conditioning in all rooms"
cd_venue_amenity_power:
  other: "Power outlets at every seat"
cd_venue_amenity_parking:
  other: "Parking available"
cd_transport_title:
  other: "Getting There"
cd_transport_from_sti:
  other: "From Cibao Airport (STI)"
cd_transport_from_sti_desc:
  other: "Cibao International Airport is just 20 minutes by car from UAPA — the most convenient option. A taxi or Uber costs approximately RD$600-900."
cd_transport_from_sdq:
  other: "From Las Américas Airport (SDQ)"
cd_transport_from_sdq_desc:
  other: "Located in Santo Domingo, 2.5 hours from Santiago. Take a bus (guagua) from Santo Domingo to Santiago for RD$400-600, or rent a car. Main operators: Caribe Tours and APTPRA."
cd_transport_public:
  other: "Public Transit"
cd_transport_public_desc:
  other: "Santiago has public car routes (conchos) and buses connecting the entire city. The closest route to UAPA runs along Av. Hispanoamericana. Average fare: RD$35 per trip."
cd_transport_private:
  other: "Private Transport"
cd_transport_private_desc:
  other: "Several private transport companies offer door-to-door service. A taxi from anywhere in Santiago to UAPA costs RD$200-500 depending on distance."
cd_transport_rideshare:
  other: "Uber / Indriver"
cd_transport_rideshare_desc:
  other: "Uber and InDriver operate in Santiago with affordable rates. From downtown to UAPA costs approximately RD$150-300. The most recommended option for comfort and price."
cd_transport_rental:
  other: "Car Rental"
cd_transport_rental_desc:
  other: "At Cibao Airport you'll find Hertz, Avis, and Budget. Prices range from USD $30-60 per day. Driving in Santiago is straightforward with ample parking at UAPA."
