cd_testimonial_text:
  other: "“Containers don't just transform the way we develop software; they transform the way we think about innovation. Learning Cloud Native today is preparing to build the smart, scalable, and resilient solutions that the world will need tomorrow”"
cd_testimonial_name:
  other: "Ing. Ismael Paulino Ureña"
cd_testimonial_role:
  other: "Software Engineer"
cd_testimonial_subtitle:
  other: "mentor at the School of Engineering and Technology"

cd_testimonial_moises_text:
  other: "“Artificial Intelligence and Cloud Native are not future technologies; they are the tools with which we are building the present. Containers Day represents an opportunity for our university community to connect innovation, software development, and real impact on a global scale”"
cd_testimonial_moises_name:
  other: "Lic. Moises Alain Mayet Solano"
cd_testimonial_moises_role:
  other: "Cyberneticist, Director of the UAPA Artificial Intelligence Department"
cd_testimonial_moises_subtitle:
  other: "developer of institutional solutions and lead developer of Scale2Connect"

cd_testimonial_reyna_text:
  other: "“Continuous training is the key to remaining relevant in a technological world that evolves every day. Containers Day represents an opportunity to learn, innovate, and strengthen competencies in high-impact technologies such as Cloud Native and containers, preparing professionals capable of leading the digital transformation of the future.”"
cd_testimonial_reyna_name:
  other: "Dra. Reyna Hiraldo Trejo"
cd_testimonial_reyna_role:
  other: "Director of the UCAP Continuous Training Center, UAPA"
cd_testimonial_reyna_subtitle:
  other: "Facilitator at the School of Engineering and Technology and Postgraduate Program"

