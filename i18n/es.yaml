cd_tourism_intro:
  other: "Aprovecha tu viaje a Containers Day en Santiago de los Caballeros para sumergirte en la historia, la cultura y la alegría."
cd_tourism_activity_1_tag:
  other: "Cultura"
cd_tourism_activity_1_title:
  other: "Monumento a la Restauración"
cd_tourism_activity_1_desc:
  other: "El icono indiscutible de Santiago. Una torre majestuosa de 70 metros que ofrece las mejores vistas panorámicas de la ciudad y el valle del Cibao."
cd_tourism_activity_1_cta:
  other: "Explorar Museo →"
cd_tourism_activity_2_tag:
  other: "Arte"
cd_tourism_activity_2_title:
  other: "Centro Cultural León"
cd_tourism_activity_2_desc:
  other: "Uno de los museos más modernos y premiados del Caribe. Una inmersión profunda en la identidad, el arte y la ecología dominicana."
cd_tourism_activity_2_cta:
  other: "Ver Exposiciones →"
cd_tourism_activity_3_tag:
  other: "Tradición"
cd_tourism_activity_3_title:
  other: "La Aurora Cigar World"
cd_tourism_activity_3_desc:
  other: "Visita la fábrica de cigarros más antigua del país. Conoce el proceso artesanal del tabaco premium que ha puesto a Santiago en el mapa mundial."
cd_tourism_activity_3_cta:
  other: "Agendar Tour →"
cd_tourism_activity_4_tag:
  other: "Urbano"
cd_tourism_activity_4_title:
  other: "Murales de Los Pepines"
cd_tourism_activity_4_desc:
  other: "Un estallido de creatividad en las calles. Arte urbano vibrante que celebra el carnaval, la música y las tradiciones santiagueras."
cd_tourism_activity_4_cta:
  other: "Paseo Fotográfico →"
cd_tourism_activity_5_tag:
  other: "Gastronomía"
cd_tourism_activity_5_title:
  other: "Sabor del Cibao"
cd_tourism_activity_5_desc:
  other: "Desde el legendario Mofongo hasta la alta cocina fusión. Santiago es el epicentro gastronómico para los paladares más exigentes."
cd_tourism_activity_5_cta:
  other: "Guía Gastronómica →"
cd_tourism_activity_6_tag:
  other: "Historia"
cd_tourism_activity_6_title:
  other: "Catedral Santiago Apóstol"
cd_tourism_activity_6_desc:
  other: "Pillar del centro histórico. Una joya arquitectónica de finales del siglo XIX que guarda la esencia espiritual y patriótica de la ciudad."
cd_tourism_activity_6_cta:
  other: "Visita Histórica →"
cd_venue_name:
  other: "Universidad UAPA (UAPA)"
cd_venue_desc:
  other: "Sede oficial de Containers Day 2026. Un campus moderno con instalaciones diseñadas para la educación y la innovación tecnológica."
cd_venue_address:
  other: "Av. Hispanoamericana #100, Thomén, Código postal 51000, Santiago de los Caballeros, República Dominicana"
cd_venue_about_title:
  other: "Sobre la Sede"
cd_venue_about_desc:
  other: "La Universidad para Adultos (UAPA) es una institución pionera en educación superior a distancia en República Dominicana. Su campus en Santiago cuenta con auditorios, aulas inteligentes y espacios modernos ideales para un evento tecnológico."
cd_venue_accessibility_title:
  other: "Accesibilidad"
cd_venue_accessibility_desc:
  other: "El campus de la UAPA cuenta con instalaciones accesibles, incluyendo rampas, ascensores y baños adaptados para personas con movilidad reducida."
cd_venue_amenities_title:
  other: "Servicios"
cd_venue_amenity_wifi:
  other: "WiFi de alta velocidad en todo el campus"
cd_venue_amenity_ac:
  other: "Aire acondicionado en todas las salas"
cd_venue_amenity_power:
  other: "Tomas de corriente en cada asiento"
cd_venue_amenity_parking:
  other: "Estacionamiento disponible"
cd_transport_title:
  other: "Cómo Llegar"
cd_transport_from_sti:
  other: "Desde el Aeropuerto del Cibao (STI)"
cd_transport_from_sti_desc:
  other: "El aeropuerto internacional del Cibao está a solo 20 minutos en carro desde la UAPA. Es la opción más conveniente. En taxi o Uber el trayecto cuesta aproximadamente RD$600-900."
cd_transport_from_sdq:
  other: "Desde el Aeropuerto Las Américas (SDQ)"
cd_transport_from_sdq_desc:
  other: "Ubicado en Santo Domingo, a 2.5 horas de Santiago. Puedes tomar una guagua (autobús) desde la terminal de Santo Domingo hasta Santiago por RD$400-600, o alquilar un carro. Las principales operadoras son Caribe Tours y APTPRA."
cd_transport_public:
  other: "Transporte Público"
cd_transport_public_desc:
  other: "Santiago cuenta con rutas de carros públicos (conchos) y guaguas que conectan toda la ciudad. La ruta más cercana a la UAPA pasa por la Av. Hispanoamericana. El costo promedio es de RD$35 por viaje."
cd_transport_private:
  other: "Transporte Privado"
cd_transport_private_desc:
  other: "Varias empresas de transporte privado ofrecen servicios puerta a puerta. Taxi desde cualquier punto de Santiago hasta la UAPA cuesta entre RD$200-500 dependiendo de la distancia."
cd_transport_rideshare:
  other: "Uber / Indriver"
cd_transport_rideshare_desc:
  other: "Uber e InDriver operan en Santiago con tarifas accesibles. Desde el centro de la ciudad hasta la UAPA el viaje cuesta aproximadamente RD$150-300. Es la opción más recomendada por su comodidad y precio."
cd_transport_rental:
  other: "Alquiler de Autos"
cd_transport_rental_desc:
  other: "En el aeropuerto del Cibao encontrás rentadoras como Hertz, Avis y Budget. Los precios oscilan entre USD $30-60 por día. Conducir en Santiago es sencillo y hay amplio estacionamiento en la UAPA."
