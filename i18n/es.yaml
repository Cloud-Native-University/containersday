cd_testimonial_text:
  other: "“Los contenedores no solo transforman la forma en que desarrollamos software; transforman la manera en que pensamos la innovación. Aprender Cloud Native hoy es prepararse para construir las soluciones inteligentes, escalables y resilientes que el mundo necesitará mañana”"
cd_testimonial_name:
  other: "Ing. Ismael Paulino Ureña"
cd_testimonial_role:
  other: "Ingeniero en Software"
cd_testimonial_subtitle:
  other: "mentor de la Escuela de Ingeniería y Tecnología"

cd_testimonial_moises_text:
  other: "“La Inteligencia Artificial y el Cloud Native no son tecnologías del futuro; son las herramientas con las que estamos construyendo el presente. Containers Day representa una oportunidad para que nuestra comunidad universitaria conecte innovación, desarrollo de software e impacto real a escala global”"
cd_testimonial_moises_name:
  other: "Lic. Moises Alain Mayet Solano"
cd_testimonial_moises_role:
  other: "Cibernético, Director del Departamento de Inteligencia Artificial de UAPA"
cd_testimonial_moises_subtitle:
  other: "desarrollador de soluciones institucionales y programador principal de Scale2Connect"

cd_testimonial_reyna_text:
  other: "“La capacitación continua es la clave para mantenerse vigente en un mundo tecnológico que evoluciona cada día. Containers Day representa una oportunidad para aprender, innovar y fortalecer competencias en tecnologías de alto impacto como Cloud Native y contenedores, preparando profesionales capaces de liderar la transformación digital del futuro.”"
cd_testimonial_reyna_name:
  other: "Dra. Reyna Hiraldo Trejo"
cd_testimonial_reyna_role:
  other: "Directora del Centro de Capacitación Continua UCAP, UAPA"
cd_testimonial_reyna_subtitle:
  other: "Facilitadora de la Escuela de Ingeniería y Tecnología y el Posgrado"

