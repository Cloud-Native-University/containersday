                    directions: |
                        La **Universidad Abierta para Adultos (UAPA)** se encuentra en la Av. Hispanoamericana #100, Thomén, Código postal 51000, Santiago de los Caballeros, República Dominicana.

                        **En vehículo particular o taxi:**  
                        Puedes llegar fácilmente tomando la Autopista Duarte. La UAPA está ubicada en la Av. Hispanoamericana, una de las principales vías de acceso en la zona sur de la ciudad. Hay amplio estacionamiento disponible para los asistentes.

                        **Desde el Aeropuerto Internacional del Cibao (STI):**  
                        El campus se encuentra a unos 15 minutos en taxi desde el aeropuerto siguiendo la Autopista Duarte hacia el este y luego tomando la Av. Hispanoamericana.
