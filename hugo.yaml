                        **By car or taxi:**  
                        You can easily reach the campus via the Duarte Highway (Autopista Duarte). UAPA is situated on Av. Hispanoamericana, one of the main access roads in the southern part of the city. Ample parking is available for attendees.

                        **From Cibao International Airport (STI):**  
                        The campus is approximately a 15-minute taxi ride from the airport. Follow the Duarte Highway west and exit onto Av. Hispanoamericana.
