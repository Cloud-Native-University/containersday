baseURL: https://containers.day/
theme: event

defaultContentLanguage: es

languages:
    es:
        disabled: false
        languageName: "Español"
        contentDir: "content"
        weight: 1
        menus:
            main:
                - identifier: sessions
                  name: "Agenda"
                  pageRef: /sessions
                  weight: 20
                - identifier: speakers
                  name: "Ponentes"
                  pageRef: /speakers
                  weight: 30
                - identifier: tourism
                  name: "Turismo Tropical"
                  pageRef: /tourism
                  weight: 45
                - identifier: sponsors
                  name: "Patrocinadores"
                  pageRef: /sponsors
                  weight: 50
    en:
        disabled: false
        languageName: "English"
        contentDir: "content/en"
        weight: 2
        menus:
            main:
                - identifier: sessions
                  name: "Schedule"
                  pageRef: /sessions
                  weight: 20
                - identifier: speakers
                  name: "Speakers"
                  pageRef: /speakers
                  weight: 30
                - identifier: tourism
                  name: "Tropical Tourism"
                  pageRef: /tourism
                  weight: 45
                - identifier: sponsors
                  name: "Sponsors"
                  pageRef: /sponsors
                  weight: 50

params:
    images:
        - logos/logo-containersday-v2.png
    themes:
        event:
            title: "Containers Day"
            slogan: "¡La conferencia tecnológica más importante del Caribe!"
            location: "UAPA, Santiago"
            contactEmail: "hola@containers.day"
            favicon: "logos/logo-containersday-v2.png"
            startDate: "2026-08-22"
            endDate: "2026-08-22"
            address:
                - "Universidad UAPA"
                - "Santiago de los Caballeros"
                - "República Dominicana"
            callToAction:
                url: "#register"
            callToActionSecondary:
                url: "https://sessionize.com/containers-days-dr/"
                label: "Ser Orador"
            socialLinks:
                xUrl: https://x.com/containerslatam
                facebookUrl: https://www.facebook.com/containersday
                linkedinUrl: https://www.linkedin.com/company/containersday-dr
            images:
                logo: logos/logo-containersday-v2.png
                titleBackground: images/hero-background-v2.jpg
            heroSlides:
                - title: "Orquestando el Mañana"
                  subtitle: "Innovación"
                  description: "IA + Cloud Native"
                  image: images/hero-background-v2.jpg
                - title: "Infraestructura Inteligente"
                  subtitle: "Escalabilidad"
                  description: "Modelos de IA"
                  image: images/hero-background-v3.jpg
                - title: "El Motor de la Innovación"
                  subtitle: "Tecnología"
                  description: "Contenedores e IA"
                  image: images/hero-background-v4.png
                - title: "Modernización Blindada"
                  subtitle: "Seguridad"
                  description: "Arquitecturas Cloud Native"
                  image: images/hero-background-v5.png
                - title: "Más allá de la Nube"
                  subtitle: "Rendimiento"
                  description: "Escalabilidad y Seguridad"
                  image: images/hero-background-v2.jpg
            sponsors:
                - logo: "logos/nixversity-cover.png"
                  url: "https://nixversity.com/"
                  name: 'NixVersity'
                  description: 'Líderes en formación de DevOps y Cloud Native en la región.'
                  tier: "platinum"
                - logo: "logos/uapa-logo-white.png"
                  url: "https://www.uapa.edu.do/"
                  name: 'UAPA'
                  description: 'Sede oficial de Containers Day 2026.'
                  tier: "platinum"
            sponsorTiers:
                platinum:
                    label: "🏆 Patrocinador Platinum"
                    color: "#E5E4E2"
                gold:
                    label: "🥇 Patrocinador Oro"
                silver:
                    label: "🥈 Patrocinador Plata"
                community:
                    label: "🤝 Patrocinador Comunitario"
            colors:
                primary: '#5dade2'
                primaryDarker: '#143e8b'
            redirectBasedOnBrowserLang: false
