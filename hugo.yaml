        params:
            # Open Graph / X (Twitter) Cards
            description: |
                Un sitio web de demostración para mostrar las características del tema "Event" para el
                generador de sitios web estáticos HUGO.
            themes:
                event:
                    slogan: ¡La cumbre tecnológica más importante del Caribe!
                    location: UAPA, Santiago
                    description: |
                        Bienvenido a **Containers Day**. Esta será la primera versión del evento más importante de contenedores y cloud native de la región del Caribe. Un evento de 2 días: 1 día de charlas técnicas de alto nivel y 1 día de networking exclusivo.
                    directions: |
                        #### Llegando al Evento
                        Puedes volar directamente al Aeropuerto Internacional del Cibao (STI) en Santiago. Contaremos con transporte dedicado para asistentes hacia el campus universitario.

                        #### Hospedaje y Ciudad:
                        Santiago de los Caballeros ofrece una gran variedad de hoteles y alojamientos estratégicos muy cerca de la UAPA para tu máxima comodidad y conveniencia.
                    aboutUs: |
                        ### Misión
                        Ayudamos a las empresas y organizaciones a transformar digitalmente sus negocios, productos y procesos a través de consultoría,
                        estrategia, diseño, desarrollo de software y formación utilizando tecnología de vanguardia.

                        ### Fundación
                        - **2002** - Año de fundación

                        ### Nuestro Equipo
                        - **25+** Empleados
                        - **5** Nacionalidades

                        ### Información Adicional
                        - Reunimos diversas experiencias e innovación.
                    callToActionSecondary:
                        label: ¡Conviértete en ponente!
                    heroSlides:
                        - title: "¡La cumbre tecnológica más importante del Caribe!"
                          subtitle: "Containers Day 2026"
                          description: "Impulsamos la innovación tecnológica en el Caribe. Containers Day es el punto de encuentro para expertos en Cloud Native, Kubernetes y DevOps."
                          image: images/hero-background-v2.jpg
                        - title: "Aprende de los Mejores Expertos"
                          subtitle: "Sesiones Técnicas"
                          description: "Sumérgete en charlas de alto nivel sobre Kubernetes, Docker y el ecosistema Cloud Native con conferencistas internacionales y locales."
                          image: images/hero-background-v5.png
                        - title: "Impulsando el Ecosistema Tecnológico"
                          subtitle: "Nuestra Visión"
                          description: "Forma parte del cambio. Containers Day es el motor de innovación para la próxima generación de profesionales en el Caribe y el mundo."
                          image: images/hero-background-v4.png
                    gallery:
                        title: "Nuestra Galería"
                        images:
                            - images/hero-background-v2.jpg
                            - images/hero-background-v3.jpg
                            - images/hero-background-v4.png
                            - images/hero-background-v5.png

