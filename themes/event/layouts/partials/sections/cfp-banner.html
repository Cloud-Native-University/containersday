{{ $input := . }}

<style>
    .cfp-banner {
        background: linear-gradient(135deg, var(--event-blue, #5dade2) 0%, #2378b0 100%);
        padding: 4rem 0;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .cfp-banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            45deg,
            transparent,
            transparent 20px,
            rgba(255,255,255,0.03) 20px,
            rgba(255,255,255,0.03) 40px
        );
    }
    .cfp-banner__content {
        position: relative;
        z-index: 1;
    }
    .cfp-banner__icon {
        display: block;
        font-size: 2.5rem;
        margin-bottom: 1rem;
        line-height: 1;
    }
    .cfp-banner__heading {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 0.75rem;
        line-height: 1.2;
    }
    .cfp-banner__subtext {
        font-size: 1.1rem;
        color: rgba(255,255,255,0.85);
        margin-bottom: 2rem;
        line-height: 1.5;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }
    .cfp-banner__button {
        display: inline-block;
        padding: 1rem 2.5rem;
        background: #fff;
        color: var(--event-blue, #5dade2);
        font-weight: 800;
        font-size: 1rem;
        border-radius: 5px;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .cfp-banner__button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
</style>

<div class="cfp-banner">
    <div class="container cfp-banner__content">
        <span class="cfp-banner__icon">🎤</span>
        <h2 class="cfp-banner__heading">{{ T "cfp_banner.heading" }}</h2>
        <p class="cfp-banner__subtext">{{ T "cfp_banner.message" }}</p>
        <a href="{{ $input.cfpUrl }}" class="cfp-banner__button" target="_blank" rel="noopener">
            {{ $input.cfpLabel }} →
        </a>
    </div>
</div>
