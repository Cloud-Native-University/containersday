{{ $input := . }}

<time class="counter-container" datetime="{{ $input.targetDate }}" style="display: none;">
    <div class="counter__segment">
        <span class="counter__value countdown-days">0</span>
        <span class="counter__label">{{ T "countdown.days" }}</span>
    </div>
    <div class="counter__segment">
        <span class="counter__value countdown-hours">0</span>
        <span class="counter__label">{{ T "countdown.hours" }}</span>
    </div>
    <div class="counter__segment">
        <span class="counter__value countdown-minutes">0</span>
        <span class="counter__label">{{ T "countdown.minutes" }}</span>
    </div>
    <div class="counter__segment">
        <span class="counter__value countdown-seconds">0</span>
        <span class="counter__label">{{ T "countdown.seconds" }}</span>
    </div>
</time>

<style>
.counter-ended {
    text-align: center;
    padding: 16px 24px;
    font-family: var(--font-display);
    font-weight: 700;
    color: #2ecc71;
    font-size: 1.1rem;
    display: none;
}
</style>
<div class="counter-ended"></div>

<script>
  (function() {
    const containers = document.querySelectorAll(".counter-container");
    const endedEls = document.querySelectorAll(".counter-ended");

    const SECOND_IN_MS = 1000;
    const MINUTE_IN_MS = SECOND_IN_MS * 60;
    const HOUR_IN_MS = MINUTE_IN_MS * 60;
    const DAY_IN_MS = HOUR_IN_MS * 24;

    const raw = "{{ $input.targetDate }}";
    const end = /T/.test(raw) ? new Date(raw) : new Date(raw + "T00:00:00");

    function updateAllCounters() {
      const now = new Date();
      let distance = end - now;

      if (distance <= 0) {
        containers.forEach(el => el.style.display = "none");
        endedEls.forEach(el => {
            el.style.display = "block";
            el.innerHTML = "{{ T "countdown.ended" }}";
        });
        if (window.countdownInterval) {
            clearInterval(window.countdownInterval);
            window.countdownInterval = null;
        }
        return;
      }

      containers.forEach(el => el.style.display = "flex");
      endedEls.forEach(el => el.style.display = "none");

      const d = Math.floor(distance / DAY_IN_MS);
      const h = Math.floor((distance % DAY_IN_MS) / HOUR_IN_MS);
      const m = Math.floor((distance % HOUR_IN_MS) / MINUTE_IN_MS);
      const s = Math.floor((distance % MINUTE_IN_MS) / SECOND_IN_MS);

      document.querySelectorAll(".countdown-days").forEach(el => el.innerHTML = d);
      document.querySelectorAll(".countdown-hours").forEach(el => el.innerHTML = h);
      document.querySelectorAll(".countdown-minutes").forEach(el => el.innerHTML = m);
      document.querySelectorAll(".countdown-seconds").forEach(el => el.innerHTML = s);
    }

    if (!window.countdownInterval) {
        updateAllCounters();
        window.countdownInterval = setInterval(updateAllCounters, 1000);
    }
  })();
</script>
