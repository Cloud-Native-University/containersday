{{ $event := .Site.Params.themes.event }}
<style>
    .generic-hero {
        position: relative;
        overflow: hidden;
        background:
            linear-gradient(rgba(10, 17, 40, 0.82), rgba(10, 17, 40, 0.72)),
            url('{{ $event.images.titleBackground | relURL }}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        padding: clamp(72px, 12vh, 120px) 0;
        text-align: center;
        color: white;
        margin-bottom: 0;
    }
    .generic-hero__video {
        position: absolute;
        top: 50%;
        left: 50%;
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        z-index: 0;
        transform: translate(-50%, -50%);
        object-fit: cover;
    }
    .generic-hero__overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 17, 40, 0.72);
        z-index: 1;
    }
    .generic-hero .container {
        position: relative;
        z-index: 2;
    }
    .generic-hero h1 {
        font-family: var(--font-display);
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.1;
        margin: 0;
        overflow-wrap: break-word;
    }
    .generic-hero .breadcrumb {
        background: transparent;
        padding: 0;
        margin-bottom: 16px;
        justify-content: center;
    }
    .generic-hero .breadcrumb-item a {
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        transition: color 0.2s;
    }
    .generic-hero .breadcrumb-item a:hover {
        color: var(--accent);
    }
    .generic-hero .breadcrumb-item.active {
        color: white;
    }
    .generic-hero .breadcrumb-item + .breadcrumb-item::before {
        color: rgba(255, 255, 255, 0.4);
    }

    @media (max-width: 576px) {
        .generic-hero { padding: 64px 0; }
        .generic-hero h1 { letter-spacing: 1px; }
    }
</style>

<section class="generic-hero">
    {{ if fileExists "static/videos/hero-background.mp4" }}
    <video autoplay muted loop playsinline class="generic-hero__video">
        <source src="/videos/hero-background.mp4" type="video/mp4">
    </video>
    <div class="generic-hero__overlay"></div>
    {{ end }}
    <div class="container text-center">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a href="{{ site.Home.RelPermalink }}">{{ T "cd_home" }}</a></li>
                {{ if and .Parent (not .Parent.IsHome) }}
                    <li class="breadcrumb-item"><a href="{{ .Parent.RelPermalink }}">{{ .Parent.Title }}</a></li>
                {{ end }}
                <li class="breadcrumb-item active" aria-current="page">{{ .Title }}</li>
            </ol>
        </nav>
        <h1 class="animate__animated animate__fadeInDown">{{ .Title }}</h1>
    </div>
</section>
