{{ define "main" }}
    {{- partial "generic-hero.html" . }}


    <style>
        .volunteers-section {
            padding: 100px 0;
            background-color: #fafbfc;
            background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px);
            background-size: 24px 24px;
            position: relative;
        }
        .volunteers-container {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .volunteers-intro {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px auto;
            font-size: 1.25rem;
            color: #475569;
            line-height: 1.8;
            font-weight: 450;
            position: relative;
        }
        .volunteers-intro::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: 2px;
        }
        .volunteers-form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 24px;
            box-shadow:
                0 10px 30px -10px rgba(0, 0, 0, 0.04),
                0 1px 3px rgba(0, 0, 0, 0.02);
            padding: 24px;
        }
    </style>

    <div class="volunteers-section">
        <div class="volunteers-container">
            <p class="volunteers-intro">{{ T "cd_volunteers_intro" }}</p>

            <div class="volunteers-form-card">
                <iframe
                    data-tally-src="https://tally.so/embed/{{ site.Params.themes.event.volunteersTallyFormId }}?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
                    loading="lazy"
                    width="100%"
                    height="200"
                    frameborder="0"
                    marginheight="0"
                    marginwidth="0"
                    title="{{ T `cd_volunteers_form_title` }}"></iframe>
            </div>
        </div>
    </div>

    <script src="https://tally.so/widgets/embed.js"></script>
    <script>
        (function () {
            function loadTallyEmbeds() {
                if (typeof Tally !== 'undefined') {
                    Tally.loadEmbeds();
                    return;
                }
                document.querySelectorAll('iframe[data-tally-src]:not([src])').forEach(function (iframe) {
                    iframe.src = iframe.dataset.tallySrc;
                });
            }

            if (document.readyState === 'complete') {
                loadTallyEmbeds();
            } else {
                window.addEventListener('load', loadTallyEmbeds);
            }
        })();
    </script>
{{ end }}
